
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>영상 속 추천템 모음집</title>
    <!-- SEO 최적화 메타 태그 -->
    <meta name="description" content="유튜브 쇼츠 영상에서 소개된 신박하고 유용한 추천 아이템들을 한눈에 확인하고 구매할 수 있는 모음집입니다.">
    <meta property="og:title" content="영상 속 추천템 모음집">
    <meta property="og:description" content="영상 속 그 제품! 바로 확인해보세요.">
    <meta property="og:type" content="website">
    
    <!-- 구글 폰트 적용 (Pretendard) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    
    <style>
        /* ... existing styles ... */
        :root {
            --primary-color: #ff3f3f;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 40px 20px 20px;
            background: linear-gradient(180deg, rgba(255, 63, 63, 0.1) 0%, var(--bg-color) 100%);
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-color: #333;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border: 3px solid var(--card-bg);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        .subtitle { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 25px; }

        /* --- Search Bar --- */
        .search-container {
            max-width: 600px;
            margin: 0 auto 20px auto;
            padding: 0 15px;
        }
        
        .search-box {
            display: flex;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 25px;
            padding: 5px 15px;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .search-box input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            padding: 10px;
            outline: none;
        }
        
        .search-box input::placeholder {
            color: #666;
        }
        
        .search-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .search-btn:hover {
            background-color: #e63939;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 15px 40px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        /* --- Card Styles --- */
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: 0.2s;
            position: relative;
        }
        
        /* 검색으로 찾은 항목 강조 효과 */
        .card.highlight {
            border: 2px solid var(--primary-color);
            box-shadow: 0 0 15px rgba(255, 63, 63, 0.5);
            transform: scale(1.02);
            transition: 0.5s all;
        }

        .item-number {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0,0,0,0.7);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 12px;
            z-index: 10;
        }

        .card-img-wrapper {
            width: 100%;
            padding-top: 100%;
            position: relative;
            background-color: #2a2a2a;
        }

        .card-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-title {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
        }

        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .card-price {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .btn-buy {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 0.75rem;
            padding: 6px 12px;
            border-radius: 8px;
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        /* 알림 메시지 (토스트) */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 10px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 0.9rem;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }
        
        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }

        @media (max-width: 350px) {
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="profile-img">📺</div>
        <h1>영상 속 추천템 모음</h1>
        <p class="subtitle">쇼츠 영상에서 본 그 제품! 바로 확인하세요 👀</p>
    </header>
    
    <!-- 검색 영역 -->
    <div class="search-container">
        <form class="search-box" onsubmit="searchItem(event)">
            <input type="number" id="searchInput" placeholder="영상 속 번호(No. 숫자) 입력" min="1">
            <button type="submit" class="search-btn">검색</button>
        </form>
    </div>

    <div class="container">
        <div class="product-grid" id="productGrid">
            <!-- 파이썬 코드가 여기에 상품 목록을 주입합니다 -->
            
            <a href="https://link.coupang.com/a/d5OXPP" target="_blank" rel="noopener noreferrer" class="card" id="item-7">
                <div class="item-number">No. 7</div>
                <div class="card-img-wrapper">
                    <!-- 이미지가 없을 경우를 대비한 placeholder 텍스트 설정 -->
                    <img src="images/item_7.jpg" alt="3M 전동 핸드그라인더 4CG-2" class="card-img" onerror="this.src='data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3A%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3A%22100%25%22%20height%3A%22100%25%22%3E%3Crect%20fill%3A%22%232a2a2a%22%20width%3A%22100%25%22%20height%3A%22100%25%22%2F%3E%3Ctext%20fill%3A%22%23555555%22%20font-family%3A%22sans-serif%22%20font-size%3A%2214%22%20dy%3A%2210.5%22%20font-weight%3A%22bold%22%20x%3A%2250%25%22%20y%3A%2250%25%22%20text-anchor%3A%22middle%22%3ENo%20Image%3C%2Ftext%3E%3C%2Fsvg%3E'">
                </div>
                <div class="card-content">
                    <h2 class="card-title">3M 전동 핸드그라인더 4CG-2</h2>
                    <div class="card-bottom">
                        <span class="card-price">28,000원</span>
                        <span class="btn-buy">구경하기</span>
                    </div>
                </div>
            </a>

        </div>
    </div>

    <footer>
        <p>© 2026 꿀템 리뷰 채널. All rights reserved.</p>
    </footer>

    <!-- 알림 메시지 엘리먼트 -->
    <div id="toast">해당 번호의 상품을 찾을 수 없습니다.</div>

    <script>
        function searchItem(event) {
            event.preventDefault();
            const input = document.getElementById('searchInput');
            const num = input.value.trim();
            
            if(!num) return;
            
            // 모든 카드의 하이라이트 초기화
            document.querySelectorAll('.card').forEach(c => c.classList.remove('highlight'));
            
            // 입력한 번호의 아이템 찾기 (ID 속성에 바인딩되어 있음)
            const targetId = 'item-' + num;
            const targetCard = document.getElementById(targetId);
            
            if(targetCard) {
                // 부드럽게 스크롤
                targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // 하이라이트 효과
                targetCard.classList.add('highlight');
                // 2초 뒤 Ха이라이트 제거
                setTimeout(() => targetCard.classList.remove('highlight'), 2000);
            } else {
                showToast(num + "번 상품을 찾을 수 없습니다.");
            }
        }
        
        function showToast(msg) {
            const toast = document.getElementById("toast");
            toast.innerText = msg;
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }
    </script>
</body>
</html>
